stages:
  - lint
  - audit
  - test

variables:
  NODE_VERSION: "24"

# Stage 1: Syntax validation + ESLint
lint-job:
  stage: lint
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --prefer-offline
  script:
    - echo "Running syntax checks on all JavaScript files..."
    - find api/ src/ -name '*.js' -exec node --check {} +
    - node --check tests/*.js
    - echo "All JavaScript files pass syntax validation."
    - echo "Running ESLint no-undef checks..."
    - npx eslint api/ src/
    - echo "ESLint checks passed."

dco-check:
  stage: lint
  image: node:${NODE_VERSION}
  script:
    - |
      echo "--- DCO Signature Check ---"
      FAILED=0
      for commit in $(git log origin/main..HEAD --format=%H 2>/dev/null); do
        if ! git log -1 --format=%B "$commit" | grep -q "Signed-off-by:"; then
          echo "FAIL: Commit $(git log -1 --format='%h %s' $commit) missing Signed-off-by"
          FAILED=1
        fi
      done
      if [ "$FAILED" = "1" ]; then
        echo "DCO check failed. Use: git commit -s"
        exit 1
      fi
      echo "PASS: All commits have valid Signed-off-by lines"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Stage 2: Comprehensive compliance audit (240+ checks)
audit-job:
  stage: audit
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --prefer-offline
  script:
    - echo "Running comprehensive compliance audit..."
    - bash ./scripts/comprehensive-compliance-audit.sh
    - echo "Running npm supply chain audit..."
    - npm audit --audit-level=critical
  allow_failure: false

# Stage 3: Test suite
test-job:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --prefer-offline
  script:
    - echo "Running Redis KV in-memory fallback tests..."
    - node --test tests/test-redis-kv.js
    - echo "Running render pipeline smoke tests..."
    - node --test tests/test-render-smoke.js
    - echo "Running screen endpoint smoke tests..."
    - node --test tests/test-screen-smoke.js
    - echo "Running auth middleware tests..."
    - node --test tests/test-auth-middleware.js
    - echo "Running opendata client unit tests..."
    - node --test tests/test-opendata-client-unit.js
  allow_failure: false
