stages:
  - lint
  - audit
  - test

variables:
  NODE_VERSION: "20"

# Stage 1: Syntax validation
lint-job:
  stage: lint
  image: node:${NODE_VERSION}
  script:
    - echo "Running syntax checks on all JavaScript files..."
    - find api/ src/ -name '*.js' -exec node --check {} +
    - echo "All JavaScript files pass syntax validation."

# Stage 2: Comprehensive compliance audit (214 checks)
audit-job:
  stage: audit
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --prefer-offline
  script:
    - echo "Running comprehensive compliance audit..."
    - bash ./scripts/comprehensive-compliance-audit.sh
    - echo "Running npm supply chain audit..."
    - npm audit --audit-level=critical || echo "WARN: npm audit found vulnerabilities"
  allow_failure: false

# Stage 3: Test suite
test-job:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --prefer-offline
  script:
    - echo "Running test suite..."
    - npm test
  allow_failure: false
