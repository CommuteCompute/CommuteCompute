stages:
  - lint
  - audit
  - test

variables:
  NODE_VERSION: "20"

# Stage 1: Syntax validation + ESLint
lint-job:
  stage: lint
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --prefer-offline
  script:
    - echo "Running syntax checks on all JavaScript files..."
    - find api/ src/ -name '*.js' -exec node --check {} +
    - node --check tests/*.js
    - echo "All JavaScript files pass syntax validation."
    - echo "Running ESLint no-undef checks..."
    - npx eslint api/ src/
    - echo "ESLint checks passed."

# Stage 2: Comprehensive compliance audit (240+ checks)
audit-job:
  stage: audit
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --prefer-offline
  script:
    - echo "Running comprehensive compliance audit..."
    - bash ./scripts/comprehensive-compliance-audit.sh
    - echo "Running npm supply chain audit..."
    - npm audit --audit-level=critical
  allow_failure: false

# Stage 3: Test suite
test-job:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - npm ci --prefer-offline
  script:
    - echo "Running Redis KV in-memory fallback tests..."
    - node --test tests/test-redis-kv.js
    - echo "Running render pipeline smoke tests..."
    - node --test tests/test-render-smoke.js
    - echo "Running screen endpoint smoke tests..."
    - node --test tests/test-screen-smoke.js
  allow_failure: false
