<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" style="background: #0f172a">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#6366f1"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#10b981"/>
    </marker>
    <marker id="arrowhead3" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead4" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#ec4899"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9" text-anchor="middle">
    Commute Compute V15.0 Data Flow Architecture
  </text>
  <text x="600" y="70" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Complete journey from data sources to e-ink display
  </text>

  <!-- Layer 1: Data Sources -->
  <text x="600" y="110" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#fbbf24" text-anchor="middle">DATA SOURCES</text>

  <rect x="60" y="130" width="240" height="100" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="158" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">Transport Victoria</text>
  <text x="180" y="178" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">OpenData API (GTFS-RT)</text>
  <text x="180" y="196" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Live departures + stop data</text>
  <text x="180" y="214" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Route shapes + timetables</text>

  <rect x="340" y="130" width="240" height="100" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="158" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">BOM Weather API</text>
  <text x="460" y="178" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Bureau of Meteorology</text>
  <text x="460" y="196" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Current conditions + forecast</text>
  <text x="460" y="214" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">UV index + rain probability</text>

  <rect x="620" y="130" width="240" height="100" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="740" y="158" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">Google Places API (New)</text>
  <text x="740" y="178" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">places.googleapis.com/v1</text>
  <text x="740" y="196" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Geocoding + cafe lookup</text>
  <text x="740" y="214" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Busyness data</text>

  <rect x="900" y="130" width="240" height="100" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="1020" y="158" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">User Preferences</text>
  <text x="1020" y="178" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Vercel KV Storage</text>
  <text x="1020" y="196" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Addresses + profiles</text>
  <text x="1020" y="214" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Device status + config</text>

  <!-- Arrows from data sources -->
  <path d="M 180 230 L 180 280 L 600 280 L 600 310" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowhead3)"/>
  <path d="M 460 230 L 460 280 L 600 280" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <path d="M 740 230 L 740 280 L 600 280" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <path d="M 1020 230 L 1020 280 L 600 280" stroke="#f59e0b" stroke-width="2" fill="none"/>

  <!-- Layer 2: CommuteCompute Engine -->
  <rect x="350" y="310" width="500" height="120" rx="12" fill="url(#grad2)" opacity="0.9" filter="url(#glow)"/>
  <text x="600" y="343" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">CommuteCompute Engine v2.4</text>
  <text x="600" y="365" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d1fae5" text-anchor="middle">Core journey planning + multi-modal routing</text>
  <text x="600" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d1fae5" text-anchor="middle">Find nearby stops (GTFS) + calculate walking distances</text>
  <text x="600" y="405" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d1fae5" text-anchor="middle">Build 1-4 mode routes + walk-faster-than-transit exclusion</text>

  <!-- Arrow -->
  <path d="M 600 430 L 600 480" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrowhead2)"/>

  <!-- Layer 3: Sub-Engines -->
  <text x="600" y="500" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#a78bfa" text-anchor="middle">ENGINE STACK</text>

  <!-- DepartureConfidence Engine -->
  <rect x="60" y="520" width="220" height="100" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="170" y="548" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">DepartureConfidence</text>
  <text x="170" y="566" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">0-100% confidence score</text>
  <text x="170" y="584" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Real-time reliability</text>
  <text x="170" y="602" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Historical accuracy</text>

  <!-- LifestyleContext Engine -->
  <rect x="310" y="520" width="220" height="100" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="420" y="548" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">LifestyleContext v1.1</text>
  <text x="420" y="566" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Umbrella / Jacket / Sunglasses</text>
  <text x="420" y="584" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Sunscreen / Hydration / Layers</text>
  <text x="420" y="602" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">calculateMindset (stress, steps)</text>

  <!-- CoffeeDecision -->
  <rect x="560" y="520" width="220" height="100" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="670" y="548" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">CoffeeDecision</text>
  <text x="670" y="566" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Cafe timing analysis</text>
  <text x="670" y="584" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Busyness check (Places)</text>
  <text x="670" y="602" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">YES / NO decision</text>

  <!-- SleepOptimizer Engine -->
  <rect x="810" y="520" width="220" height="100" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="920" y="548" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">SleepOptimizer</text>
  <text x="920" y="566" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Evening bedtime calc</text>
  <text x="920" y="584" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Alarm time suggestion</text>
  <text x="920" y="602" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Sleep quality scoring</text>

  <!-- AltTransit Engine (centered below) -->
  <rect x="490" y="640" width="220" height="100" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="600" y="668" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">AltTransit Engine</text>
  <text x="600" y="686" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Rideshare cost estimates</text>
  <text x="600" y="704" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Bike / scooter availability</text>
  <text x="600" y="722" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Cost comparison</text>

  <!-- Arrows from engines -->
  <path d="M 170 620 L 170 770 L 600 770 L 600 800" stroke="#8b5cf6" stroke-width="2" fill="none"/>
  <path d="M 420 620 L 420 770 L 600 770" stroke="#8b5cf6" stroke-width="2" fill="none"/>
  <path d="M 670 620 L 670 770 L 600 770" stroke="#8b5cf6" stroke-width="2" fill="none"/>
  <path d="M 920 620 L 920 770 L 600 770" stroke="#8b5cf6" stroke-width="2" fill="none"/>
  <path d="M 600 740 L 600 770" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Layer 4: Data Assembly -->
  <rect x="350" y="800" width="500" height="100" rx="12" fill="url(#grad3)" opacity="0.9"/>
  <text x="600" y="833" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">DATA MODEL ASSEMBLY</text>
  <text x="600" y="858" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fef3c7" text-anchor="middle">Merges all engine outputs into unified dashboard model</text>
  <text x="600" y="878" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fef3c7" text-anchor="middle">Decision logging + transparency audit trail</text>

  <!-- Arrow -->
  <path d="M 600 900 L 600 950" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowhead3)"/>

  <!-- Layer 5: CCDash Renderer -->
  <rect x="350" y="950" width="500" height="110" rx="12" fill="url(#grad4)" opacity="0.9" filter="url(#glow)"/>
  <text x="600" y="985" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">CCDash Renderer v1.81</text>
  <text x="600" y="1008" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">1-bit BMP rendering for e-ink display</text>
  <text x="600" y="1028" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">Floyd-Steinberg dithering + font rendering</text>
  <text x="600" y="1048" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">Layout engine: header, departures, weather, coffee, lifestyle</text>

  <!-- Arrow -->
  <path d="M 600 1060 L 600 1110" stroke="#ec4899" stroke-width="3" fill="none" marker-end="url(#arrowhead4)"/>

  <!-- Layer 6: Output Formats -->
  <text x="600" y="1130" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#22c55e" text-anchor="middle">OUTPUT FORMATS</text>

  <rect x="130" y="1150" width="240" height="80" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="250" y="1178" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">800x480 1-bit BMP</text>
  <text x="250" y="1198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">E-ink device (primary)</text>
  <text x="250" y="1215" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">/api/screen</text>

  <rect x="420" y="1150" width="200" height="80" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="520" y="1178" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">PNG</text>
  <text x="520" y="1198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Preview / debug</text>
  <text x="520" y="1215" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">/api/screen?format=png</text>

  <rect x="670" y="1150" width="200" height="80" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="770" y="1178" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">JSON</text>
  <text x="770" y="1198" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Debug data model</text>
  <text x="770" y="1215" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">/api/display</text>

  <!-- Arrow from outputs to device -->
  <path d="M 250 1230 L 250 1280 L 600 1280 L 600 1310" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>

  <!-- Layer 7: Device -->
  <rect x="350" y="1310" width="500" height="140" rx="12" fill="url(#grad1)" opacity="0.9" filter="url(#glow)"/>
  <text x="600" y="1345" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">TRMNL E-INK DEVICE</text>
  <text x="600" y="1368" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e0e7ff" text-anchor="middle">ESP32-C3 + 7.5" 800x480 display</text>
  <text x="600" y="1388" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e0e7ff" text-anchor="middle">CCFirm CC-FW-7.5.0 custom firmware</text>
  <text x="600" y="1408" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e0e7ff" text-anchor="middle">Partial refresh: 1 minute | Full refresh: 5 minutes</text>
  <text x="600" y="1428" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e0e7ff" text-anchor="middle">Deep sleep between updates</text>

  <!-- Arrow -->
  <path d="M 600 1450 L 600 1500" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Layer 8: Dashboard Output -->
  <rect x="300" y="1500" width="600" height="160" rx="12" fill="#10b981" opacity="0.9"/>
  <text x="600" y="1535" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">CC LiveDash Display</text>
  <text x="600" y="1560" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">Leave by: 8:42 AM (in 12 minutes) | Confidence: 94%</text>
  <text x="600" y="1583" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">Next Trains: 8:47, 8:52, 9:02 | Alt: Rideshare $18</text>
  <text x="600" y="1606" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">Coffee: YES - 4 min available | Bedtime: 10:30 PM</text>
  <text x="600" y="1629" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">Weather: 18C, Partly Cloudy | Bring: Sunglasses, Water</text>
  <text x="600" y="1652" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">Mindset: Low stress | Steps: 2,400 est.</text>

  <!-- Footer -->
  <text x="600" y="1690" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">
    Commute Compute V15.0 | CommuteCompute Engine v2.4 | CCDash Renderer v1.81
  </text>
  <text x="600" y="1710" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">
    Response time: 5-10 seconds | Updates every 2 minutes
  </text>

  <!-- Copyright -->
  <text x="600" y="1780" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">
    Copyright (c) 2026 Angus Bergman | AGPL-3.0 Dual License
  </text>
</svg>
