<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" style="background: #0f172a">
  <defs>
    <!-- Gradients -->
    <radialGradient id="coreGrad">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="layer1Grad">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.1" />
    </radialGradient>
    <radialGradient id="layer2Grad">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.1" />
    </radialGradient>
    <radialGradient id="layer3Grad">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.1" />
    </radialGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Connection lines style -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#6366f1" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="50" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#f1f5f9" text-anchor="middle">
    Commute Compute V15.0 System Architecture
  </text>
  <text x="700" y="85" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">
    Concentric layers showing engine stack and component interactions
  </text>

  <!-- Layer 3: External Services (Outermost circle) -->
  <circle cx="700" cy="720" r="580" fill="url(#layer3Grad)" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="700" y="150" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#fbbf24" text-anchor="middle">
    LAYER 3: External Data Sources
  </text>

  <!-- External service boxes -->
  <!-- Transport Victoria OpenData API -->
  <g transform="translate(140, 280)">
    <rect x="0" y="0" width="200" height="110" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">Transport Victoria</text>
    <text x="100" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">OpenData API</text>
    <text x="100" y="66" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">GTFS-RT live departures</text>
    <text x="100" y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Stop data + timetables</text>
    <text x="100" y="98" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Route shapes</text>
  </g>

  <!-- BOM Weather API -->
  <g transform="translate(1060, 280)">
    <rect x="0" y="0" width="200" height="110" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">BOM Weather API</text>
    <text x="100" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Bureau of Meteorology</text>
    <text x="100" y="66" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Current conditions</text>
    <text x="100" y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Forecasts + UV index</text>
    <text x="100" y="98" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Rain probability</text>
  </g>

  <!-- Google Places API (New) -->
  <g transform="translate(140, 1010)">
    <rect x="0" y="0" width="200" height="110" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">Google Places API</text>
    <text x="100" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(New) v1 endpoint</text>
    <text x="100" y="66" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Geocoding + autocomplete</text>
    <text x="100" y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Cafe lookup</text>
    <text x="100" y="98" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Busyness data</text>
  </g>

  <!-- Vercel KV -->
  <g transform="translate(1060, 1010)">
    <rect x="0" y="0" width="200" height="110" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">User Preferences</text>
    <text x="100" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Vercel KV Storage</text>
    <text x="100" y="66" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Addresses + profiles</text>
    <text x="100" y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Device status</text>
    <text x="100" y="98" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">API keys (encrypted)</text>
  </g>

  <!-- Layer 2: Engine Stack (Middle circle) -->
  <circle cx="700" cy="720" r="400" fill="url(#layer2Grad)" stroke="#10b981" stroke-width="3" opacity="0.5"/>
  <text x="700" y="340" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#22c55e" text-anchor="middle">
    LAYER 2: V15.0 Engine Stack
  </text>

  <!-- CommuteCompute Engine v3.0 -->
  <g transform="translate(400, 400)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
    <text x="100" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">CommuteCompute v3.0</text>
    <text x="100" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Core journey planning</text>
    <text x="100" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Multi-modal routing</text>
    <text x="100" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Walk-faster exclusion</text>
    <text x="100" y="92" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">GTFS stop matching</text>
  </g>

  <!-- DepartureConfidence Engine -->
  <g transform="translate(720, 400)">
    <rect x="0" y="0" width="200" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">DepartureConfidence</text>
    <text x="100" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">0-100% score</text>
    <text x="100" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Real-time reliability</text>
    <text x="100" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Historical accuracy</text>
  </g>

  <!-- LifestyleContext Engine v1.1 -->
  <g transform="translate(350, 560)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">LifestyleContext v1.1</text>
    <text x="100" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Umbrella / Jacket / Sunglasses</text>
    <text x="100" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Sunscreen / Hydration / Layers</text>
    <text x="100" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">calculateMindset()</text>
    <text x="100" y="88" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Stress / steps / feels-like</text>
  </g>

  <!-- CoffeeDecision™ -->
  <g transform="translate(780, 540)">
    <rect x="0" y="0" width="180" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="90" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">CoffeeDecision™</text>
    <text x="90" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Cafe timing analysis</text>
    <text x="90" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Busyness check</text>
    <text x="90" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">YES / NO decision</text>
  </g>

  <!-- SleepOptimizer Engine -->
  <g transform="translate(380, 880)">
    <rect x="0" y="0" width="180" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="90" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">SleepOptimizer</text>
    <text x="90" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Evening bedtime calc</text>
    <text x="90" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Alarm time suggestion</text>
    <text x="90" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Sleep quality scoring</text>
  </g>

  <!-- AltTransit Engine -->
  <g transform="translate(780, 880)">
    <rect x="0" y="0" width="180" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="90" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">AltTransit Engine</text>
    <text x="90" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Rideshare / bike / scooter</text>
    <text x="90" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Cost comparison</text>
    <text x="90" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Availability check</text>
  </g>

  <!-- CCDash Renderer -->
  <g transform="translate(330, 720)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">CCDash v2.0</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">1-bit BMP renderer</text>
    <text x="80" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Floyd-Steinberg</text>
    <text x="80" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Layout engine</text>
  </g>

  <!-- Decision Logger -->
  <g transform="translate(900, 700)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">Decision Logger</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Transparency log</text>
    <text x="80" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Audit trail</text>
    <text x="80" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Fallback tracking</text>
  </g>

  <!-- Layer 1: Outputs &amp; Interface (Inner circle) -->
  <circle cx="700" cy="720" r="220" fill="url(#layer1Grad)" stroke="#6366f1" stroke-width="3" opacity="0.6"/>
  <text x="700" y="520" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#a78bfa" text-anchor="middle">
    LAYER 1: Outputs &amp; Interface
  </text>

  <!-- Output components -->
  <!-- E-Ink BMP Output -->
  <g transform="translate(560, 600)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#glow)"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">800x480 BMP</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">1-bit e-ink output</text>
    <text x="80" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">/api/screen</text>
    <text x="80" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Primary display</text>
  </g>

  <!-- PNG + JSON Outputs -->
  <g transform="translate(560, 760)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">PNG + JSON</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Preview / debug</text>
    <text x="80" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Data model export</text>
    <text x="80" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Admin interface</text>
  </g>

  <!-- Core: Commute Compute System (Center) -->
  <circle cx="700" cy="720" r="80" fill="url(#coreGrad)" stroke="#6366f1" stroke-width="4" filter="url(#glow)"/>
  <text x="700" y="700" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">
    COMMUTE
  </text>
  <text x="700" y="720" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">
    COMPUTE
  </text>
  <text x="700" y="745" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e0e7ff" text-anchor="middle">
    V15.0
  </text>
  <text x="700" y="762" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#c7d2fe" text-anchor="middle">
    System 4.0.0
  </text>

  <!-- Connection lines (showing data flow) -->
  <!-- Core to Layer 1 -->
  <line x1="700" y1="640" x2="640" y2="610" stroke="#6366f1" stroke-width="2" opacity="0.6" stroke-dasharray="4,2"/>
  <line x1="700" y1="800" x2="640" y2="820" stroke="#6366f1" stroke-width="2" opacity="0.6" stroke-dasharray="4,2"/>

  <!-- Layer 1 to Layer 2 -->
  <line x1="560" y1="640" x2="500" y2="500" stroke="#10b981" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>
  <line x1="560" y1="640" x2="450" y2="600" stroke="#10b981" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>
  <line x1="720" y1="600" x2="780" y2="540" stroke="#10b981" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>
  <line x1="720" y1="600" x2="720" y2="490" stroke="#10b981" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>
  <line x1="640" y1="840" x2="470" y2="880" stroke="#10b981" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>
  <line x1="720" y1="840" x2="870" y2="880" stroke="#10b981" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>
  <line x1="560" y1="760" x2="490" y2="760" stroke="#10b981" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>
  <line x1="720" y1="760" x2="900" y2="740" stroke="#10b981" stroke-width="2" opacity="0.4" stroke-dasharray="4,2"/>

  <!-- Layer 2 to Layer 3 -->
  <line x1="400" y1="450" x2="340" y2="350" stroke="#f59e0b" stroke-width="2" opacity="0.3" stroke-dasharray="4,2"/>
  <line x1="920" y1="445" x2="1060" y2="350" stroke="#f59e0b" stroke-width="2" opacity="0.3" stroke-dasharray="4,2"/>
  <line x1="350" y1="620" x2="340" y2="1050" stroke="#f59e0b" stroke-width="2" opacity="0.3" stroke-dasharray="4,2"/>
  <line x1="960" y1="920" x2="1060" y2="1050" stroke="#f59e0b" stroke-width="2" opacity="0.3" stroke-dasharray="4,2"/>

  <!-- Legend -->
  <g transform="translate(100, 1280)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">
      System Layers
    </text>

    <!-- Core -->
    <circle cx="10" cy="25" r="8" fill="#6366f1"/>
    <text x="25" y="30" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">
      Core: Commute Compute V15.0 orchestrator
    </text>

    <!-- Layer 1 -->
    <circle cx="10" cy="50" r="8" fill="#6366f1"/>
    <text x="25" y="55" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">
      Layer 1: Output formats (BMP, PNG, JSON) &amp; admin interface
    </text>

    <!-- Layer 2 -->
    <circle cx="10" cy="75" r="8" fill="#10b981"/>
    <text x="25" y="80" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">
      Layer 2: Engine stack (CommuteCompute™, DepartureConfidence, LifestyleContext, CoffeeDecision™, SleepOptimizer, AltTransit)
    </text>

    <!-- Layer 3 -->
    <circle cx="10" cy="100" r="8" fill="#f59e0b"/>
    <text x="25" y="105" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">
      Layer 3: External data sources (Transport Victoria, BOM, Google Places, Vercel KV)
    </text>
  </g>

  <!-- Data flow indicator -->
  <g transform="translate(950, 1280)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">
      Data Flow
    </text>
    <text x="0" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">
      Data Sources --&gt; Engine Stack --&gt; Renderer
    </text>
    <text x="0" y="45" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">
      Renderer --&gt; BMP/PNG/JSON --&gt; Device
    </text>
    <text x="0" y="70" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">
      ---- Solid: Direct connection
    </text>
    <text x="0" y="88" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">
      - - Dashed: API / Network call
    </text>
  </g>

  <!-- Version + Copyright footer -->
  <text x="700" y="1360" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
    Commute Compute V15.0 | CommuteCompute Engine v3.0 | CCDash Renderer v2.0 | System 4.0.0
  </text>
  <text x="700" y="1385" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">
    Copyright (c) 2026 Angus Bergman | AGPL-3.0 Dual License
  </text>
</svg>
